<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>انتهت الرحلة — مادّة الفيزياء</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Tajawal', sans-serif;
    /* خلفية كونية متدرجة */
    background: #010206;
    background-image: 
      radial-gradient(circle at 15% 50%, rgba(74, 168, 247, 0.08) 0%, transparent 40%),
      radial-gradient(circle at 85% 30%, rgba(167, 139, 250, 0.08) 0%, transparent 40%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow-x: hidden;
    position: relative;
    color: #f0f6ff;
  }

  /* ─── الخلفية ─── */
  canvas#bg {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0;
  }
  
  /* ─── البطاقة الرئيسية ─── */
  .slide {
    position: relative; z-index: 2;
    background: rgba(10, 14, 26, 0.5);
    border: 1px solid rgba(120, 200, 255, 0.15);
    border-radius: 28px;
    padding: 60px 52px 50px;
    max-width: 820px;
    width: 92%;
    text-align: center;
    backdrop-filter: blur(25px);
    -webkit-backdrop-filter: blur(25px);
    box-shadow: 0 0 120px rgba(50, 120, 255, 0.1), inset 0 1px 0 rgba(255,255,255,0.03);
    overflow: hidden;
  }
  
  .slide::before {
    content: '';
    position: absolute;
    top: -2px; left: -2px; right: -2px; bottom: -2px;
    background: linear-gradient(135deg, rgba(74, 168, 247, 0.2), rgba(167, 139, 250, 0.2));
    z-index: -1;
    border-radius: 30px;
    filter: blur(5px);
  }

  .subject-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(50, 130, 255, 0.1);
    border: 1px solid rgba(80, 160, 255, 0.25);
    border-radius: 100px;
    padding: 7px 22px;
    font-size: 15px;
    color: #87cfff;
    letter-spacing: 0.04em;
    margin-bottom: 36px;
  }
  
  .subject-badge .dot {
    width: 8px; height: 8px;
    background: #4aa8f7;
    border-radius: 50%;
    animation: pulse 2.5s ease-in-out infinite;
    box-shadow: 0 0 10px rgba(74, 168, 247, 0.8);
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.3; transform: scale(0.6); }
  }
  
  .wave-wrap {
    margin: 0 auto 32px;
    width: 380px;
    height: 60px;
  }
  canvas#wave {
    display: block;
    width: 100%; height: 100%;
  }

  .main-title {
    font-size: 2.8em;
    font-weight: 900;
    color: #f8fbff;
    line-height: 1.25;
    margin-bottom: 40px;
    text-shadow: 0 0 50px rgba(100, 180, 255, 0.35);
  }
  .main-title span {
    background: linear-gradient(135deg, #4aa8f7, #a78bfa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  
  .divider {
    height: 2px;
    background: linear-gradient(90deg, transparent, rgba(120, 180, 255, 0.4), transparent);
    margin: 0 auto 40px;
    width: 65%;
  }
  
  /* ─── صندوق النداء ─── */
  .cta-box {
    background: rgba(10, 14, 26, 0.4);
    border: 1px solid rgba(80, 160, 255, 0.2);
    border-radius: 18px;
    padding: 28px 32px;
    display: flex;
    align-items: center;
    gap: 20px;
    text-align: right;
    backdrop-filter: blur(10px);
  }
  .cta-icon {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .cta-text h3 {
    font-size: 1.15em;
    font-weight: 700;
    color: #87cfff;
    margin-bottom: 6px;
  }
  .cta-text p {
    font-size: 1em;
    color: #8da4c8;
    line-height: 1.65;
  }

  /* ─── أيقونة ذرة زخرفية بخلفية شفافة تماماً ─── */
  .deco-atom {
    position: fixed;
    bottom: 50px;
    right: 50px;
    width: 65px; height: 65px;
    z-index: 1;
    pointer-events: none;
    animation: atomRotate 20s linear infinite;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  @keyframes atomRotate {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }

</style>
</head>
<body>

<canvas id="bg"></canvas>

<div class="deco-atom">
  <svg viewBox="0 0 100 100" width="100%" height="100%" style="fill:none; stroke:#4aa8f7; stroke-width:2; opacity: 0.25; filter:drop-shadow(0 0 6px rgba(74,168,247,0.5));">
    <ellipse cx="50" cy="50" rx="40" ry="14" transform="rotate(0 50 50)"/>
    <ellipse cx="50" cy="50" rx="40" ry="14" transform="rotate(60 50 50)"/>
    <ellipse cx="50" cy="50" rx="40" ry="14" transform="rotate(120 50 50)"/>
    <circle cx="50" cy="50" r="5" style="fill:#4aa8f7; stroke:none;"/>
  </svg>
</div>

<div class="slide">
  <div class="subject-badge">
    <span class="dot"></span>
    مادّة الفيزياء — حصّة الختام
  </div>

  <div class="wave-wrap">
    <canvas id="wave" width="380" height="60"></canvas>
  </div>

  <h1 class="main-title">انتهت الرحلة<span>.. شكرًا لجهودكم!</span></h1>

  <div class="divider"></div>

  <div class="cta-box">
    <div class="cta-icon">
      <svg viewBox="0 0 100 100" width="60" height="60" style="fill:none; stroke:#4aa8f7; stroke-width:2.5; filter:drop-shadow(0 0 8px rgba(74,168,247,0.7));">
        <ellipse cx="50" cy="50" rx="38" ry="12" transform="rotate(0 50 50)"/>
        <ellipse cx="50" cy="50" rx="38" ry="12" transform="rotate(60 50 50)"/>
        <ellipse cx="50" cy="50" rx="38" ry="12" transform="rotate(120 50 50)"/>
        <circle cx="50" cy="50" r="6" style="fill:#4aa8f7; stroke:none; filter:drop-shadow(0 0 10px #4aa8f7);"/>
      </svg>
    </div>
    <div class="cta-text">
      <h3>في خدمتكم دائمًا 💡</h3> 
      <p>أنا متواجد معكم الآن لأي استفسار أو سؤال يخص المنهج.. لا تترددوا!</p>
    </div>
  </div>
</div>

<script>
/* ─── خلفية النجوم والفضاء المحسنة ─── */
const bgCanvas = document.getElementById('bg');
const bgCtx = bgCanvas.getContext('2d');
let W, H, particles = [], tick = 0;

function resize() { W = bgCanvas.width = window.innerWidth; H = bgCanvas.height = window.innerHeight; }
function initParticles() {
  particles = [];
  const count = Math.min(Math.floor(W * H / 4000), 250); 
  for (let i = 0; i < count; i++) {
    let pColor = '#ffffff'; 
    let rand = Math.random();
    if(rand > 0.8) pColor = '#4aa8f7';
    else if(rand > 0.9) pColor = '#a78bfa';

    particles.push({
      x: Math.random()*W, y: Math.random()*H,
      r: Math.random()*1.8 + 0.1, 
      vx: (Math.random()-0.5)*0.15, vy: (Math.random()-0.5)*0.15,
      alpha: Math.random()*0.8 + 0.2,
      color: pColor,
      twinkleSpeed: Math.random()*0.03 + 0.01
    });
  }
}

/* ─── موجة متحركة محسنة ─── */
const wc = document.getElementById('wave');
const wCtx = wc.getContext('2d');
const WW = 380, WH = 60, CY = 30, AMP = 20, FREQ = 2.2;
let phase = 0;

function drawWave() {
  wCtx.clearRect(0, 0, WW, WH);

  wCtx.save();
  wCtx.beginPath();
  for (let x = 0; x <= WW; x++) {
    const y = CY + AMP * Math.sin((x / WW) * Math.PI * 2 * FREQ - phase);
    x === 0 ? wCtx.moveTo(x, y) : wCtx.lineTo(x, y);
  }
  const grad = wCtx.createLinearGradient(0, 0, WW, 0);
  grad.addColorStop(0,   '#a78bfa');
  grad.addColorStop(0.5, '#4aa8f7');
  grad.addColorStop(1,   '#a78bfa');
  
  wCtx.strokeStyle = grad;
  wCtx.lineWidth = 2.8; 
  wCtx.lineJoin = 'round';
  wCtx.shadowColor = '#4aa8f7';
  wCtx.shadowBlur = 10; 
  wCtx.stroke();
  wCtx.restore();

  const dotCount = 6; 
  for (let i = 0; i < dotCount; i++) {
    const t = (i / dotCount + phase / (Math.PI * 2 * FREQ)) % 1;
    const x = t * WW;
    const y = CY + AMP * Math.sin((x / WW) * Math.PI * 2 * FREQ - phase);
    const c = i % 2 === 0 ? '#a78bfa' : '#4aa8f7';
    
    wCtx.beginPath();
    wCtx.arc(x, y, 4.5, 0, Math.PI * 2);
    wCtx.fillStyle = c;
    wCtx.globalAlpha = 0.95;
    wCtx.fill();
    wCtx.globalAlpha = 1;
  }

  phase += 0.035; 
}

/* ─── حلقة الرسم الرئيسية ─── */
function loop() {
  bgCtx.clearRect(0, 0, W, H);
  
  /* نجوم متلألئة */
  for (const p of particles) {
    bgCtx.beginPath(); bgCtx.arc(p.x, p.y, p.r, 0, Math.PI*2);
    bgCtx.fillStyle = p.color;
    bgCtx.globalAlpha = Math.max(0.1, p.alpha + 0.4 * Math.sin(tick * p.twinkleSpeed + p.x));
    
    if(p.r > 1.2) {
      bgCtx.shadowBlur = 8;
      bgCtx.shadowColor = p.color;
    } else {
      bgCtx.shadowBlur = 0;
    }

    bgCtx.fill(); 
    bgCtx.globalAlpha = 1;
    bgCtx.shadowBlur = 0;

    p.x += p.vx; p.y += p.vy;
    if (p.x<0) p.x=W; if (p.x>W) p.x=0;
    if (p.y<0) p.y=H; if (p.y>H) p.y=0;
  }
  
  drawWave();

  tick++;
  requestAnimationFrame(loop);
}

resize(); initParticles(); loop();
window.addEventListener('resize', () => { resize(); initParticles(); });
</script>
</body>
</html>
